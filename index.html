<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lahari Habits Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --surface2: #F0EDE8;
    --text: #1A1916;
    --text2: #6B6860;
    --text3: #A8A49E;
    --border: rgba(26,25,22,0.1);
    --border2: rgba(26,25,22,0.18);
    --green: #2D7A5F;
    --green-bg: #E8F5EF;
    --green-mid: #4AAB84;
    --amber: #B5620A;
    --amber-bg: #FEF3E6;
    --red: #C0392B;
    --radius: 12px;
    --radius-sm: 8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412;
      --surface: #1E1D1A;
      --surface2: #272521;
      --text: #F2EFE8;
      --text2: #9A9690;
      --text3: #5C5A56;
      --border: rgba(242,239,232,0.08);
      --border2: rgba(242,239,232,0.15);
      --green: #4AAB84;
      --green-bg: #0D2A1F;
      --green-mid: #2D7A5F;
      --amber: #E08A30;
      --amber-bg: #271800;
      --red: #E05A4E;
    }
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 5rem;
  }

  .app {
    max-width: 520px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 2rem;
  }

  .app-title {
    font-size: 28px;
    font-weight: 300;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .app-title span {
    font-weight: 500;
  }

  .add-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 40px;
    padding: 8px 16px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.01em;
  }

  .add-btn:hover { opacity: 0.82; }
  .add-btn:active { transform: scale(0.97); }

  /* Week strip */
  .week-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }

  .week-label {
    flex: 1;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--text3);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .nav-btn {
    background: none;
    border: 1px solid var(--border2);
    border-radius: 6px;
    width: 28px;
    height: 28px;
    cursor: pointer;
    color: var(--text2);
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.12s;
  }

  .nav-btn:hover { background: var(--surface2); }

  .week-strip {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px;
  }

  .day-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 7px 2px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.12s;
  }

  .day-cell:hover { background: var(--surface2); }
  .day-cell.selected { background: var(--text); }

  .day-name {
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text3);
  }

  .day-cell.selected .day-name { color: rgba(255,255,255,0.5); }

  .day-num {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
  }

  .day-cell.selected .day-num { color: var(--bg); }
  .day-cell.today:not(.selected) .day-num {
    background: var(--surface2);
  }

  .day-pip {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: transparent;
    transition: background 0.2s;
  }

  .day-pip.active { background: var(--green); }
  .day-cell.selected .day-pip.active { background: rgba(255,255,255,0.5); }

  /* Progress */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1rem;
  }

  .progress-label {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--text3);
    white-space: nowrap;
    min-width: 80px;
  }

  .progress-track {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 2px;
    transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .progress-pct {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--text3);
    min-width: 32px;
    text-align: right;
  }

  /* Section label */
  .section-label {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    margin-bottom: 10px;
  }

  /* Habit cards */
  .habits-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .habit-card {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    user-select: none;
  }

  .habit-card:hover { border-color: var(--border2); }
  .habit-card:active { transform: scale(0.99); }

  .habit-card.done {
    border-color: var(--green-mid);
    background: var(--green-bg);
  }

  .check {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .habit-card.done .check {
    background: var(--green);
    border-color: var(--green);
  }

  .check-svg { display: none; }
  .habit-card.done .check-svg { display: block; }

  .habit-emoji {
    font-size: 20px;
    width: 28px;
    text-align: center;
    flex-shrink: 0;
  }

  .habit-body { flex: 1; min-width: 0; }

  .habit-name {
    font-size: 15px;
    font-weight: 400;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .habit-card.done .habit-name { color: var(--green); }

  .habit-sub {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--text3);
    margin-top: 2px;
  }

  .habit-card.done .habit-sub { color: var(--green-mid); }

  .streak-pill {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    color: var(--amber);
    background: var(--amber-bg);
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .del-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    padding: 4px;
    border-radius: 4px;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.15s, color 0.12s;
    line-height: 1;
  }

  .habit-card:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: var(--red); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 3.5rem 1rem;
    color: var(--text3);
    font-size: 14px;
    line-height: 2;
  }

  .empty-icon { font-size: 32px; margin-bottom: 8px; }

  /* Modal */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 1.5rem;
    width: 100%;
    max-width: 360px;
    animation: modal-in 0.2s ease;
  }

  @keyframes modal-in {
    from { opacity: 0; transform: scale(0.96) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal h3 {
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 1rem;
  }

  .emoji-grid {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    gap: 3px;
    margin-bottom: 1rem;
  }

  .emoji-btn {
    background: none;
    border: 1px solid transparent;
    border-radius: 6px;
    font-size: 18px;
    cursor: pointer;
    padding: 5px 2px;
    text-align: center;
    transition: border-color 0.1s, background 0.1s;
    line-height: 1;
  }

  .emoji-btn:hover { background: var(--surface2); }
  .emoji-btn.sel { border-color: var(--border2); background: var(--surface2); }

  .modal-input {
    width: 100%;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    padding: 9px 12px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--bg);
    color: var(--text);
    margin-bottom: 1rem;
    outline: none;
    transition: border-color 0.15s;
  }

  .modal-input:focus { border-color: var(--text2); }
  .modal-input::placeholder { color: var(--text3); }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  .btn-cancel {
    background: none;
    border: 1px solid var(--border2);
    border-radius: 40px;
    padding: 7px 16px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text2);
    cursor: pointer;
  }

  .btn-cancel:hover { background: var(--surface2); }

  .btn-add {
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 40px;
    padding: 7px 18px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn-add:hover { opacity: 0.8; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1 class="app-title">Lahari's <span>habits</span></h1>
    <button class="add-btn" onclick="openModal()">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Add habit
    </button>
  </div>

  <div class="week-nav">
    <button class="nav-btn" onclick="shiftWeek(-1)">&#8592;</button>
    <span class="week-label" id="week-label"></span>
    <button class="nav-btn" onclick="shiftWeek(1)">&#8594;</button>
  </div>

  <div class="week-strip" id="week-strip"></div>

  <div class="progress-row" id="progress-row" style="display:none">
    <span class="progress-label" id="prog-label">0 of 0</span>
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    <span class="progress-pct" id="prog-pct">0%</span>
  </div>

  <div class="section-label" id="section-label">Today</div>
  <div class="habits-list" id="habits-list"></div>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>New habit</h3>
    <div class="emoji-grid" id="emoji-grid"></div>
    <input class="modal-input" id="habit-input" placeholder="Name your habit..." maxlength="40" onkeydown="if(event.key==='Enter')saveHabit()">
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-add" onclick="saveHabit()">Add</button>
    </div>
  </div>
</div>

<script>
const EMOJIS = ['🏃','💪','📚','🧘','🥗','💧','😴','✍️','🎸','🧠','🌿','🏋️','🚴','🧹','💊','🌅','🎯','🛁'];
let habits = JSON.parse(localStorage.getItem('ht2_habits') || '[]');
let completions = JSON.parse(localStorage.getItem('ht2_comps') || '{}');
let weekOffset = 0;
let selectedDay = todayKey();
let selEmoji = EMOJIS[0];

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function pad(n) { return String(n).padStart(2,'0'); }

function dateKey(d) {
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function save() {
  localStorage.setItem('ht2_habits', JSON.stringify(habits));
  localStorage.setItem('ht2_comps', JSON.stringify(completions));
}

function getWeekDays() {
  const base = new Date();
  base.setDate(base.getDate() + weekOffset * 7);
  const monday = new Date(base);
  monday.setDate(base.getDate() - ((base.getDay() + 6) % 7));
  return Array.from({length: 7}, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}

function getStreak(id) {
  let streak = 0;
  const d = new Date();
  for (let i = 0; i < 365; i++) {
    const k = dateKey(d);
    if (completions[k] && completions[k].includes(id)) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}

function renderWeek() {
  const days = getWeekDays();
  const today = todayKey();
  const names = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const strip = document.getElementById('week-strip');
  strip.innerHTML = '';
  days.forEach((d, i) => {
    const k = dateKey(d);
    const isSel = k === selectedDay;
    const isToday = k === today;
    const hasDone = completions[k] && completions[k].length > 0;
    const cell = document.createElement('div');
    cell.className = 'day-cell' + (isSel ? ' selected' : '') + (isToday ? ' today' : '');
    cell.innerHTML = `<span class="day-name">${names[i]}</span><span class="day-num">${d.getDate()}</span><span class="day-pip${hasDone ? ' active' : ''}"></span>`;
    cell.onclick = () => { selectedDay = k; render(); };
    strip.appendChild(cell);
  });

  const wdays = getWeekDays();
  const opts = { month: 'short', day: 'numeric' };
  document.getElementById('week-label').textContent =
    `${wdays[0].toLocaleDateString('en-US', opts)} — ${wdays[6].toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;
}

function renderHabits() {
  const done = completions[selectedDay] || [];
  const today = todayKey();
  const isToday = selectedDay === today;
  const label = isToday ? 'Today' : new Date(selectedDay + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  document.getElementById('section-label').textContent = label;

  const list = document.getElementById('habits-list');
  const progRow = document.getElementById('progress-row');

  if (habits.length === 0) {
    progRow.style.display = 'none';
    list.innerHTML = `<div class="empty"><div class="empty-icon">🌱</div>No habits yet.<br>Add your first one to get started.</div>`;
    return;
  }

  progRow.style.display = 'flex';
  const pct = Math.round((done.length / habits.length) * 100);
  document.getElementById('prog-label').textContent = `${done.length} of ${habits.length}`;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';

  list.innerHTML = '';
  habits.forEach(h => {
    const isDone = done.includes(h.id);
    const streak = getStreak(h.id);
    const card = document.createElement('div');
    card.className = 'habit-card' + (isDone ? ' done' : '');
    card.innerHTML = `
      <div class="check">
        <svg class="check-svg" width="11" height="11" viewBox="0 0 11 11" fill="none">
          <path d="M1.5 5.5l3 3 5-5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="habit-emoji">${h.emoji}</span>
      <div class="habit-body">
        <div class="habit-name">${h.name}</div>
        <div class="habit-sub">${streak > 0 ? streak + '-day streak' : 'start today'}</div>
      </div>
      ${streak >= 3 ? `<span class="streak-pill">${streak}d 🔥</span>` : ''}
      <button class="del-btn" title="Remove habit" onclick="delHabit('${h.id}', event)">&#x2715;</button>
    `;
    card.onclick = e => { if (!e.target.closest('.del-btn')) toggleHabit(h.id); };
    list.appendChild(card);
  });
}

function render() { renderWeek(); renderHabits(); }

function toggleHabit(id) {
  if (!completions[selectedDay]) completions[selectedDay] = [];
  const idx = completions[selectedDay].indexOf(id);
  if (idx === -1) completions[selectedDay].push(id);
  else completions[selectedDay].splice(idx, 1);
  save(); render();
}

function delHabit(id, e) {
  e.stopPropagation();
  if (!confirm('Remove this habit?')) return;
  habits = habits.filter(h => h.id !== id);
  save(); render();
}

function openModal() {
  selEmoji = EMOJIS[0];
  document.getElementById('habit-input').value = '';
  buildEmojiGrid();
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('habit-input').focus(), 120);
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }

function buildEmojiGrid() {
  const grid = document.getElementById('emoji-grid');
  grid.innerHTML = '';
  EMOJIS.forEach(em => {
    const btn = document.createElement('button');
    btn.className = 'emoji-btn' + (em === selEmoji ? ' sel' : '');
    btn.textContent = em;
    btn.onclick = () => { selEmoji = em; buildEmojiGrid(); };
    grid.appendChild(btn);
  });
}

function saveHabit() {
  const name = document.getElementById('habit-input').value.trim();
  if (!name) { document.getElementById('habit-input').focus(); return; }
  habits.push({ id: Date.now().toString(36), name, emoji: selEmoji });
  save(); closeModal(); render();
}

function shiftWeek(d) { weekOffset += d; render(); }

render();
</script>
</body>
</html>
