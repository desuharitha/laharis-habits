<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lahari Habits Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F5F0; --surface: #FFFFFF; --surface2: #F0EDE8;
    --text: #1A1916; --text2: #6B6860; --text3: #A8A49E;
    --border: rgba(26,25,22,0.1); --border2: rgba(26,25,22,0.18);
    --green: #2D7A5F; --green-bg: #E8F5EF; --green-mid: #4AAB84;
    --amber: #B5620A; --amber-bg: #FEF3E6; --red: #C0392B;
    --radius: 12px; --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412; --surface: #1E1D1A; --surface2: #272521;
      --text: #F2EFE8; --text2: #9A9690; --text3: #5C5A56;
      --border: rgba(242,239,232,0.08); --border2: rgba(242,239,232,0.15);
      --green: #4AAB84; --green-bg: #0D2A1F; --green-mid: #2D7A5F;
      --amber: #E08A30; --amber-bg: #271800; --red: #E05A4E;
    }
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem 5rem; }
  .app { max-width: 520px; margin: 0 auto; }
  .header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 2rem; }
  .app-title { font-size: 28px; font-weight: 300; letter-spacing: -0.5px; }
  .app-title span { font-weight: 500; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .sync-status { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text3); display: flex; align-items: center; gap: 5px; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); transition: background 0.3s; }
  .sync-dot.synced { background: var(--green); }
  .sync-dot.syncing { background: var(--amber); animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .add-btn { display: flex; align-items: center; gap: 6px; background: var(--text); color: var(--bg); border: none; border-radius: 40px; padding: 8px 16px; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
  .add-btn:hover { opacity: 0.82; }
  .add-btn:active { transform: scale(0.97); }
  .auth-banner { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .auth-text { font-size: 13px; color: var(--text2); line-height: 1.5; }
  .auth-text strong { color: var(--text); font-weight: 500; }
  .google-btn { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border2); border-radius: 40px; padding: 8px 16px; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; color: var(--text); cursor: pointer; white-space: nowrap; transition: background 0.12s; flex-shrink: 0; }
  .google-btn:hover { background: var(--surface2); }
  .user-row { display: flex; align-items: center; gap: 8px; margin-bottom: 1.5rem; font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .user-avatar { width: 24px; height: 24px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: var(--text2); overflow: hidden; flex-shrink: 0; }
  .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .signout-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 11px; font-family: 'DM Mono', monospace; margin-left: auto; padding: 2px 6px; border-radius: 4px; transition: color 0.12s; }
  .signout-btn:hover { color: var(--red); }
  .week-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .week-label { flex: 1; font-size: 12px; font-family: 'DM Mono', monospace; color: var(--text3); letter-spacing: 0.04em; text-transform: uppercase; }
  .nav-btn { background: none; border: 1px solid var(--border2); border-radius: 6px; width: 28px; height: 28px; cursor: pointer; color: var(--text2); font-size: 13px; display: flex; align-items: center; justify-content: center; transition: background 0.12s; }
  .nav-btn:hover { background: var(--surface2); }
  .week-strip { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-bottom: 1.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px; }
  .day-cell { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 7px 2px; border-radius: var(--radius-sm); cursor: pointer; transition: background 0.12s; }
  .day-cell:hover { background: var(--surface2); }
  .day-cell.selected { background: var(--text); }
  .day-name { font-size: 9px; font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text3); }
  .day-cell.selected .day-name { color: rgba(255,255,255,0.5); }
  .day-num { font-size: 14px; font-weight: 500; color: var(--text); width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
  .day-cell.selected .day-num { color: var(--bg); }
  .day-cell.today:not(.selected) .day-num { background: var(--surface2); }
  .day-pip { width: 4px; height: 4px; border-radius: 50%; background: transparent; transition: background 0.2s; }
  .day-pip.active { background: var(--green); }
  .day-cell.selected .day-pip.active { background: rgba(255,255,255,0.5); }
  .progress-row { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
  .progress-label { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--text3); white-space: nowrap; min-width: 80px; }
  .progress-track { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.35s cubic-bezier(0.4,0,0.2,1); }
  .progress-pct { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--text3); min-width: 32px; text-align: right; }
  .section-label { font-size: 11px; font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 10px; }
  .habits-list { display: flex; flex-direction: column; gap: 6px; }
  .habit-card { display: flex; align-items: center; gap: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; cursor: pointer; transition: border-color 0.15s, background 0.15s, transform 0.1s; user-select: none; }
  .habit-card:hover { border-color: var(--border2); }
  .habit-card:active { transform: scale(0.99); }
  .habit-card.done { border-color: var(--green-mid); background: var(--green-bg); }
  .check { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
  .habit-card.done .check { background: var(--green); border-color: var(--green); }
  .check-svg { display: none; }
  .habit-card.done .check-svg { display: block; }
  .habit-emoji { font-size: 20px; width: 28px; text-align: center; flex-shrink: 0; }
  .habit-body { flex: 1; min-width: 0; }
  .habit-name { font-size: 15px; font-weight: 400; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .habit-card.done .habit-name { color: var(--green); }
  .habit-sub { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text3); margin-top: 2px; }
  .habit-card.done .habit-sub { color: var(--green-mid); }
  .streak-pill { font-size: 11px; font-family: 'DM Mono', monospace; font-weight: 500; color: var(--amber); background: var(--amber-bg); padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--text3); padding: 4px; border-radius: 4px; font-size: 14px; transition: color 0.12s; line-height: 1; }
  .del-btn:hover { color: var(--red); }
  .empty { text-align: center; padding: 3.5rem 1rem; color: var(--text3); font-size: 14px; line-height: 2; }
  .empty-icon { font-size: 32px; margin-bottom: 8px; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
  .overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); padding: 1.5rem; width: 100%; max-width: 360px; animation: modal-in 0.2s ease; }
  @keyframes modal-in { from{opacity:0;transform:scale(0.96) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} }
  .modal h3 { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 1rem; }
  .emoji-grid { display: grid; grid-template-columns: repeat(9,1fr); gap: 3px; margin-bottom: 1rem; }
  .emoji-btn { background: none; border: 1px solid transparent; border-radius: 6px; font-size: 18px; cursor: pointer; padding: 5px 2px; text-align: center; transition: border-color 0.1s, background 0.1s; line-height: 1; }
  .emoji-btn:hover { background: var(--surface2); }
  .emoji-btn.sel { border-color: var(--border2); background: var(--surface2); }
  .modal-input { width: 100%; font-size: 14px; font-family: 'DM Sans', sans-serif; padding: 9px 12px; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); margin-bottom: 1rem; outline: none; transition: border-color 0.15s; }
  .modal-input:focus { border-color: var(--text2); }
  .modal-input::placeholder { color: var(--text3); }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; }
  .btn-cancel { background: none; border: 1px solid var(--border2); border-radius: 40px; padding: 7px 16px; font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--text2); cursor: pointer; }
  .btn-cancel:hover { background: var(--surface2); }
  .btn-add { background: var(--text); color: var(--bg); border: none; border-radius: 40px; padding: 7px 18px; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
  .btn-add:hover { opacity: 0.8; }
  .loading { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 13px; font-family: 'DM Mono', monospace; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1 class="app-title">Lahari's <span>habits</span></h1>
    <div class="header-right">
      <div class="sync-status" id="sync-status">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-label">connecting</span>
      </div>
      <button class="add-btn" onclick="openModal()" id="add-btn" style="display:none">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Add habit
      </button>
    </div>
  </div>

  <div id="auth-area">
    <div class="auth-banner">
      <div class="auth-text"><strong>Sign in to sync your habits</strong><br>Your data saves across all your devices.</div>
      <button class="google-btn" onclick="signInGoogle()">
        <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </button>
    </div>
  </div>

  <div id="user-area" style="display:none">
    <div class="user-row">
      <div class="user-avatar" id="user-avatar"></div>
      <span id="user-name"></span>
      <button class="signout-btn" onclick="signOut()">sign out</button>
    </div>
    <div class="week-nav">
      <button class="nav-btn" onclick="shiftWeek(-1)">&#8592;</button>
      <span class="week-label" id="week-label"></span>
      <button class="nav-btn" onclick="shiftWeek(1)">&#8594;</button>
    </div>
    <div class="week-strip" id="week-strip"></div>
    <div class="progress-row" id="progress-row" style="display:none">
      <span class="progress-label" id="prog-label">0 of 0</span>
      <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
      <span class="progress-pct" id="prog-pct">0%</span>
    </div>
    <div class="section-label" id="section-label">Today</div>
    <div id="habits-list"><div class="loading">loading your habits...</div></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>New habit</h3>
    <div class="emoji-grid" id="emoji-grid"></div>
    <input class="modal-input" id="habit-input" placeholder="Name your habit..." maxlength="40" onkeydown="if(event.key==='Enter')saveHabit()">
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-add" onclick="saveHabit()">Add</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, collection, onSnapshot, setDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({
  apiKey: "AIzaSyBvRsXUkbEmn72SENmlq5BUqnhs-yWEvUQ",
  authDomain: "laharis-habits.firebaseapp.com",
  projectId: "laharis-habits",
  storageBucket: "laharis-habits.firebasestorage.app",
  messagingSenderId: "281991567097",
  appId: "1:281991567097:web:9c6c4f32f23321118d7428"
});
const auth = getAuth(app);
const db = getFirestore(app);

const EMOJIS = ['🏃','💪','📚','🧘','🥗','💧','😴','✍️','🎸','🧠','🌿','🏋️','🚴','🧹','💊','🌅','🎯','🛁'];
let habits = [], completions = {}, weekOffset = 0, currentUser = null;
let selectedDay = todayKey(), selEmoji = EMOJIS[0];
let unsubHabits = null, unsubComps = null;

function todayKey() { const d = new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function pad(n) { return String(n).padStart(2,'0'); }
function dateKey(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }

function setSyncStatus(state) {
  document.getElementById('sync-dot').className = 'sync-dot ' + state;
  document.getElementById('sync-label').textContent = {synced:'synced',syncing:'saving...',error:'error'}[state] || 'connecting';
}

function getWeekDays() {
  const base = new Date(); base.setDate(base.getDate() + weekOffset * 7);
  const mon = new Date(base); mon.setDate(base.getDate() - ((base.getDay()+6)%7));
  return Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}

function getStreak(id) {
  let s=0; const d=new Date();
  for(let i=0;i<365;i++){const k=dateKey(d);if(completions[k]&&completions[k].includes(id)){s++;d.setDate(d.getDate()-1);}else break;}
  return s;
}

function renderWeek() {
  const days=getWeekDays(), today=todayKey(), names=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const strip=document.getElementById('week-strip'); strip.innerHTML='';
  days.forEach((d,i)=>{
    const k=dateKey(d),isSel=k===selectedDay,isToday=k===today,hasDone=completions[k]&&completions[k].length>0;
    const cell=document.createElement('div');
    cell.className='day-cell'+(isSel?' selected':'')+(isToday?' today':'');
    cell.innerHTML=`<span class="day-name">${names[i]}</span><span class="day-num">${d.getDate()}</span><span class="day-pip${hasDone?' active':''}"></span>`;
    cell.onclick=()=>{selectedDay=k;render();};
    strip.appendChild(cell);
  });
  const w=getWeekDays(),o={month:'short',day:'numeric'};
  document.getElementById('week-label').textContent=`${w[0].toLocaleDateString('en-US',o)} — ${w[6].toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`;
}

function renderHabits() {
  const done=completions[selectedDay]||[], today=todayKey();
  const label=selectedDay===today?'Today':new Date(selectedDay+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  document.getElementById('section-label').textContent=label;
  const list=document.getElementById('habits-list'), progRow=document.getElementById('progress-row');
  if(habits.length===0){progRow.style.display='none';list.innerHTML='<div class="empty"><div class="empty-icon">🌱</div>No habits yet.<br>Add your first one to get started.</div>';return;}
  progRow.style.display='flex';
  const pct=Math.round((done.length/habits.length)*100);
  document.getElementById('prog-label').textContent=`${done.length} of ${habits.length}`;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
  list.innerHTML='';
  habits.forEach(h=>{
    const isDone=done.includes(h.id), streak=getStreak(h.id);
    const card=document.createElement('div');
    card.className='habit-card'+(isDone?' done':'');
    card.innerHTML=`
      <div class="check"><svg class="check-svg" width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1.5 5.5l3 3 5-5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <span class="habit-emoji">${h.emoji}</span>
      <div class="habit-body"><div class="habit-name">${h.name}</div><div class="habit-sub">${streak>0?streak+'-day streak':'start today'}</div></div>
      ${streak>=3?`<span class="streak-pill">${streak}d 🔥</span>`:''}
      <button class="del-btn" title="Remove">&#x2715;</button>`;
    card.querySelector('.del-btn').onclick=e=>{e.stopPropagation();delHabit(h.id);};
    card.onclick=e=>{if(!e.target.closest('.del-btn'))toggleHabit(h.id);};
    list.appendChild(card);
  });
}

function render(){renderWeek();renderHabits();}

async function toggleHabit(id){
  if(!currentUser)return;
  const dayDone=[...(completions[selectedDay]||[])];
  const idx=dayDone.indexOf(id);
  if(idx===-1)dayDone.push(id);else dayDone.splice(idx,1);
  completions[selectedDay]=dayDone; render(); setSyncStatus('syncing');
  try{await setDoc(doc(db,'users',currentUser.uid,'completions',selectedDay),{habits:dayDone});setSyncStatus('synced');}
  catch(e){setSyncStatus('error');}
}

async function delHabit(id){
  if(!currentUser||!confirm('Remove this habit?'))return;
  habits=habits.filter(h=>h.id!==id); render(); setSyncStatus('syncing');
  try{await deleteDoc(doc(db,'users',currentUser.uid,'habits',id));setSyncStatus('synced');}
  catch(e){setSyncStatus('error');}
}

window.openModal=function(){selEmoji=EMOJIS[0];document.getElementById('habit-input').value='';buildEmojiGrid();document.getElementById('overlay').classList.add('open');setTimeout(()=>document.getElementById('habit-input').focus(),120);};
window.closeModal=function(){document.getElementById('overlay').classList.remove('open');};

function buildEmojiGrid(){
  const grid=document.getElementById('emoji-grid');grid.innerHTML='';
  EMOJIS.forEach(em=>{const btn=document.createElement('button');btn.className='emoji-btn'+(em===selEmoji?' sel':'');btn.textContent=em;btn.onclick=()=>{selEmoji=em;buildEmojiGrid();};grid.appendChild(btn);});
}

window.saveHabit=async function(){
  if(!currentUser)return;
  const name=document.getElementById('habit-input').value.trim();
  if(!name){document.getElementById('habit-input').focus();return;}
  const id=Date.now().toString(36),habit={id,name,emoji:selEmoji,createdAt:Date.now()};
  habits.push(habit);window.closeModal();render();setSyncStatus('syncing');
  try{await setDoc(doc(db,'users',currentUser.uid,'habits',id),habit);setSyncStatus('synced');}
  catch(e){setSyncStatus('error');}
};

window.shiftWeek=function(d){weekOffset+=d;render();};

window.signInGoogle=function(){
  signInWithPopup(auth,new GoogleAuthProvider()).catch(e=>{console.error(e);setSyncStatus('error');});
};

window.signOut=function(){
  if(unsubHabits)unsubHabits();if(unsubComps)unsubComps();
  habits=[];completions={};fbSignOut(auth);
};

onAuthStateChanged(auth,user=>{
  currentUser=user;
  if(user){
    document.getElementById('auth-area').style.display='none';
    document.getElementById('user-area').style.display='block';
    document.getElementById('add-btn').style.display='flex';
    const av=document.getElementById('user-avatar');
    av.innerHTML=user.photoURL?`<img src="${user.photoURL}" alt="">`:(user.displayName||user.email||'U')[0].toUpperCase();
    document.getElementById('user-name').textContent=user.displayName||user.email;
    setSyncStatus('syncing');
    if(unsubHabits)unsubHabits();if(unsubComps)unsubComps();
    unsubHabits=onSnapshot(collection(db,'users',user.uid,'habits'),snap=>{
      habits=snap.docs.map(d=>d.data()).sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));render();setSyncStatus('synced');
    },()=>setSyncStatus('error'));
    unsubComps=onSnapshot(collection(db,'users',user.uid,'completions'),snap=>{
      completions={};snap.docs.forEach(d=>{completions[d.id]=d.data().habits||[];});render();
    },()=>setSyncStatus('error'));
  } else {
    document.getElementById('auth-area').style.display='block';
    document.getElementById('user-area').style.display='none';
    document.getElementById('add-btn').style.display='none';
    setSyncStatus('connecting');
  }
});

render();
</script>
</body>
</html>
